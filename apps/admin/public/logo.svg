<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <!-- Antenna stick -->
  <line x1="100" y1="28" x2="100" y2="48" stroke="currentColor" stroke-width="6" stroke-linecap="round"/>
  <!-- Antenna ball -->
  <circle cx="100" cy="23" r="7" fill="currentColor"/>
  <!-- Head -->
  <ellipse cx="100" cy="105" rx="62" ry="55" fill="currentColor"/>
  <!-- Left ear -->
  <rect x="28" y="88" width="16" height="36" rx="8" fill="currentColor"/>
  <!-- Right ear -->
  <rect x="156" y="88" width="16" height="36" rx="8" fill="currentColor"/>
