services:
  - type: web
    name: chatbox-api
    runtime: node
    plan: free
    region: oregon
    rootDir: apps/api
    buildCommand: npm install -g pnpm@10 && cd ../.. && pnpm install --no-frozen-lockfile && pnpm --filter @chatbox/api build
    startCommand: node --dns-result-order=ipv4first dist/main.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "10000"
      - key: DISABLE_WEBSOCKET
        value: "true"
      - key: NODE_VERSION
        value: "22"
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: "15m"
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: JWT_REFRESH_EXPIRES_IN
        value: "7d"
      - key: ENCRYPTION_KEY
        generateValue: true
      - key: CORS_ORIGIN
        sync: false
      - key: API_URL
        sync: false
      - key: ADMIN_URL
        sync: false
