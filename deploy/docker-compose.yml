version: "3.9"

services:
  postgres:
    image: pgvector/pgvector:pg16
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-chatbox}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-chatbox_prod}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-chatbox} -d ${POSTGRES_DB:-chatbox_prod}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - internal

  redis:
    image: redis:7-alpine
    restart: always
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - internal

  api:
    build:
      context: ..
      dockerfile: Dockerfile
    restart: always
    environment:
      NODE_ENV: production
      PORT: 3001
      DATABASE_URL: postgresql://${POSTGRES_USER:-chatbox}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-chatbox_prod}
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-15m}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      JWT_REFRESH_EXPIRES_IN: ${JWT_REFRESH_EXPIRES_IN:-7d}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
      CORS_ORIGIN: ${CORS_ORIGIN:-*}
    volumes:
      - uploads_data:/app/apps/api/uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('http').get('http://localhost:3001/health', r => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))\""]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s

  admin:
    build:
      context: ..
      dockerfile: Dockerfile.admin
    restart: always
    environment:
      NODE_ENV: production
      PORT: 3000
      # Relative /api/v1 is used by the browser — Nginx routes it to the API.
      # Next.js rewrites use this for server-side proxying:
      API_URL: http://api:3001
    depends_on:
      - api
    networks:
      - internal

  seed:
    build:
      context: ..
      dockerfile: Dockerfile
      target: base   # build stage has source files + node_modules
    working_dir: /app/apps/api
    entrypoint: ["npx", "tsx", "src/database/seed.ts"]
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-chatbox}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-chatbox_prod}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - internal
    profiles:
      - seed

  nginx:
    image: nginx:alpine
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - admin
      - api
    networks:
      - internal

volumes:
  postgres_data:
  redis_data:
  uploads_data:

networks:
  internal:
    driver: bridge
